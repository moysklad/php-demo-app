services:
  php-demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    command:
      - /bin/sh
      - -lc
      - |
        sed -ri "s/^Listen 80$$/Listen $${APACHE_PORT}/" /etc/apache2/ports.conf
        sed -ri "s/<VirtualHost \\*:80>/<VirtualHost *:$${APACHE_PORT}>/g" /etc/apache2/sites-available/*.conf
        apache2-foreground
    ports:
      - "${APP_PORT:-8085}:${APACHE_PORT:-8085}"
