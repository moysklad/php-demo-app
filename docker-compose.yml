services:
  php-demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    command:
      - /bin/sh
      - -lc
      - |
        DATA_DIR="$$(dirname "$${APP_DB_PATH:-/var/www/html/src/php/data/app.sqlite}")"
        mkdir -p "$$DATA_DIR"
        chown -R www-data:www-data "$$DATA_DIR"
        chmod 775 "$$DATA_DIR"
        sed -ri "s/^Listen 80$$/Listen $${APACHE_PORT}/" /etc/apache2/ports.conf
        sed -ri "s/<VirtualHost \\*:80>/<VirtualHost *:$${APACHE_PORT}>/g" /etc/apache2/sites-available/*.conf
        exec apache2-foreground
    ports:
      - "${APP_PORT:-8085}:${APACHE_PORT:-8085}"
    volumes:
      - ./src/php:/var/www/html/src/php
